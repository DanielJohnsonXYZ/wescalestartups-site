name: wescalestartups-static

services:
  nginx:
    build: .
    image: wescalestartups-static:20260420
    container_name: wescalestartups-static
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    healthcheck:
      test:
        - CMD
        - wget
        - "--spider"
        - "-q"
        - "http://127.0.0.1/"
      interval: 30s
      timeout: 5s
      retries: 5
    labels:
      - traefik.enable=true
      - traefik.docker.network=pdgjxv2qnvxcpyuqyh7ensjb
      - traefik.http.middlewares.gzip.compress=true
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.routers.wss-static-http-www.entryPoints=http
      - traefik.http.routers.wss-static-http-www.middlewares=redirect-to-https
      - traefik.http.routers.wss-static-http-www.rule=Host(`www.wescalestartups.com`) && PathPrefix(`/`)
      - traefik.http.routers.wss-static-http-apex.entryPoints=http
      - traefik.http.routers.wss-static-http-apex.middlewares=redirect-to-https
      - traefik.http.routers.wss-static-http-apex.rule=Host(`wescalestartups.com`) && PathPrefix(`/`)
      - traefik.http.routers.wss-static-https-www.entryPoints=https
      - traefik.http.routers.wss-static-https-www.middlewares=gzip
      - traefik.http.routers.wss-static-https-www.rule=Host(`www.wescalestartups.com`) && PathPrefix(`/`)
      - traefik.http.routers.wss-static-https-www.service=wss-static
      - traefik.http.routers.wss-static-https-www.tls=true
      - traefik.http.routers.wss-static-https-www.tls.certresolver=letsencrypt
      - traefik.http.routers.wss-static-https-apex.entryPoints=https
      - traefik.http.routers.wss-static-https-apex.middlewares=gzip
      - traefik.http.routers.wss-static-https-apex.rule=Host(`wescalestartups.com`) && PathPrefix(`/`)
      - traefik.http.routers.wss-static-https-apex.service=wss-static
      - traefik.http.routers.wss-static-https-apex.tls=true
      - traefik.http.routers.wss-static-https-apex.tls.certresolver=letsencrypt
      - traefik.http.services.wss-static.loadbalancer.server.port=80
    networks:
      wss_wordpress_network: null

networks:
  wss_wordpress_network:
    name: pdgjxv2qnvxcpyuqyh7ensjb
    external: true
