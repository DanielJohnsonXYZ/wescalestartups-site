server_tokens off;

gzip on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types text/plain text/css text/xml application/javascript application/json application/xml image/svg+xml;

server {
  listen 80;
  server_name www.wescalestartups.com;

  return 301 https://wescalestartups.com$request_uri;
}

server {
  listen 80 default_server;
  server_name wescalestartups.com _;
  absolute_redirect off;

  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  location / {
    add_header Cache-Control "public, max-age=60, must-revalidate";
    try_files $uri.html $uri/index.html $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "public, max-age=60, must-revalidate";
  }

  error_page 404 /404.html;

  location = /404.html {
    internal;
  }

  location ~* \.(?:css|js|mjs|svg|png|jpg|jpeg|webp|avif|ico|woff|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
