name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Astro check
        run: npm run check

      - name: Build
        env:
          # Optional: when set, the build uploads source maps to Sentry so
          # production stack traces are readable. Absent (e.g. forks) -> skipped.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: npm run build

      - name: Crawl link check (if export exists)
        run: |
          if [ -f docs/crawls/latest.csv ]; then
            npm run check:links:crawl
          else
            echo "Skipping crawl link check: docs/crawls/latest.csv not found"
          fi
