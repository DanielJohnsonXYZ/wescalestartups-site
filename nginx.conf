server_tokens off;

gzip on;
gzip_vary on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types text/plain text/css text/xml application/javascript application/json application/xml image/svg+xml text/markdown;

map $http_accept $negotiate_root_markdown {
  default 0;
  ~*text/markdown 1;
}

server {
  listen 80;
  server_name www.wescalestartups.com;

  return 301 https://wescalestartups.com$request_uri;
}

server {
  listen 80 default_server;
  server_name wescalestartups.com _;
  absolute_redirect off;

  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  location = /test {
    return 301 /experimentation;
  }

  location = /test/ {
    return 301 /experimentation;
  }

  # Parity with Cloudflare Pages: agent discovery on the HTML homepage
  location = / {
    if ($negotiate_root_markdown) {
      rewrite ^ /markdown/home.md last;
    }
    add_header Link "</llms.txt>; rel=alternate; type=\"text/plain\"" always;
    add_header Link "</llms-full.txt>; rel=alternate; type=\"text/markdown\"" always;
    add_header Link "</markdown/home.md>; rel=alternate; type=\"text/markdown\"" always;
    add_header Link "</.well-known/api-catalog>; rel=api-catalog" always;
    add_header Link "</.well-known/agent-skills/index.json>; rel=alternate; type=\"application/json\"" always;
    add_header Cache-Control "public, max-age=60, must-revalidate" always;
    try_files /index.html =404;
  }

  # Markdown mirrors: correct MIME + Vary when / was negotiated to this file
  location ~* \.md$ {
    add_header Vary "Accept" always;
    add_header Cache-Control "public, max-age=60, must-revalidate" always;
    charset utf-8;
    default_type text/markdown;
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "public, max-age=60, must-revalidate";
    try_files $uri.html $uri/index.html $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "public, max-age=60, must-revalidate";
  }

  error_page 404 /404.html;

  location = /404.html {
    internal;
  }

  location ~* \.(?:css|js|mjs|svg|png|jpg|jpeg|webp|avif|ico|woff|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
